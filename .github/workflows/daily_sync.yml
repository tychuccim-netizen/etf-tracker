name: Daily ETF Data Sync

on:
  schedule:
    # 每天台灣時間 17:30 執行 (國際標準時 UTC 是 09:30)
    - cron: '30 9 * * *'
  workflow_dispatch: # 允許總裁隨時手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install pandas requests urllib3

      - name: 執行資料採集與存檔
        run: |
          python << EOF
          import pandas as pd
          import requests
          import datetime
          import os
          import urllib3

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          ETF_CONFIG = {
              "00981A": "https://pscnetsecrwd.moneydj.com/b2brwdCommon/jsondata/8f/d7/10/twetfdata.xdjjson?x=etf-Basic0005-1&a=00981A.TW&revision=910d22a1-3e10-48a1-8144-35b8a0267f0e",
              "00403A": "https://pscnetsecrwd.moneydj.com/b2brwdCommon/jsondata/61/ff/e8/twetfdata.xdjjson?x=etf-Basic0005-1&a=00403A.TW&revision=910d22a1-3e10-48a理a0267f0e"
          }
          
          HISTORY_FILE = "etf_history.csv"
          today = datetime.datetime.now().strftime('%Y-%m-%d')
          
          all_data = []
          for code, url in ETF_CONFIG.items():
              try:
                  resp = requests.get(url, verify=False, timeout=15)
                  result = resp.json()['ResultSet']['Result']
                  df = pd.DataFrame(result)
                  df['ETF'] = code
                  df['日期'] = today
                  df['代號'] = df['V2']
                  df['今日張數'] = (pd.to_numeric(df['V5']) / 1000).round(0).astype(int)
                  all_data.append(df[['日期', 'ETF', '代號', '今日張數']])
              except Exception as e:
                  print(f"Error fetching {code}: {e}")

          if all_data:
              new_df = pd.concat(all_data)
              if os.path.exists(HISTORY_FILE):
                  old_df = pd.read_csv(HISTORY_FILE)
                  # 避免重複紀錄同一天的資料
                  old_df = old_df[old_df['日期'] != today]
                  final_df = pd.concat([old_df, new_df])
              else:
                  final_df = new_df
              
              # 僅保留最近 30 天的資料，節省空間
              final_df = final_df.sort_values('日期').tail(2000) 
              final_df.to_csv(HISTORY_FILE, index=False)
          EOF

      - name: 提交存檔至 GitHub 倉庫
        run: |
          git config --global user.name "ETF-Auto-Bot"
          git config --global user.email "bot@sunmoonstar.com"
          git add etf_history.csv
          git commit -m "自動存檔：$(date +'%Y-%m-%d') 持股明細更新" || exit 0
          git push
